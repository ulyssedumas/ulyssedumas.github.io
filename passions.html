<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulysse Dumas | Passions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Ulysse<span>Dumas</span></a>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="parcours.html">Mon Parcours</a>
            <a href="passions.html" class="active">Passions & Culture</a>
        </div>
    </nav>

    <div id="imageModal" onclick="this.style.display='none'">
        <span class="close-modal">&times;</span>
        <img id="modalImg">
    </div>

    <section class="passion-section">
        <div class="parallax-bg" style="background-image: url('images/image1.jpg');"></div>
        <div class="passion-content reveal-blur">
            <h1 class="title">Art & Photographie</h1>
            <p>Cliquez sur les photos pour les agrandir au format adapté.</p>
            <div class="photo-grid">
                <img src="images/image1.jpg" onclick="openModal(this.src)">
                <img src="images/image2.jpg" onclick="openModal(this.src)">
                <img src="images/image3.jpg" onclick="openModal(this.src)">
                <img src="images/image4.jpg" onclick="openModal(this.src)">
                <img src="images/image5.jpg" onclick="openModal(this.src)">
                <img src="images/image6.jpg" onclick="openModal(this.src)">
            </div>
        </div>
    </section>

    <script>
        // Fonction pour ouvrir la photo en grand
        function openModal(src) {
            document.getElementById('imageModal').style.display = 'flex';
            document.getElementById('modalImg').src = src;
        }

        // Animation au défilement
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => { if (entry.isIntersecting) entry.target.classList.add('show'); });
        });
        document.querySelectorAll('.reveal-blur').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
